<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetra-Sync Search</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --main-blue: #00f2ff; --analyze-orange: #ff4500; }
        body { margin: 0; font-family: monospace; background: #000; color: white; overflow: hidden; }
        
        #setup { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; z-index: 1000; position: relative; background: #000; }
        .mode-btn { width: 80%; padding: 20px; font-size: 1.2rem; border: 2px solid var(--main-blue); background: transparent; color: var(--main-blue); border-radius: 10px; }

        #game-screen { display: none; width: 100vw; height: 100vh; position: relative; }
        #map { width: 100%; height: 100%; z-index: 1; }

        /* スキャンボタン */
        #scan-btn { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 15px 40px; font-size: 1.2rem; background: rgba(0, 0, 0, 0.8);
            color: var(--main-blue); border: 2px solid var(--main-blue); border-radius: 30px;
            z-index: 100; font-weight: bold; cursor: pointer;
        }
        #scan-btn:active { background: var(--main-blue); color: #000; }

        /* 解析モード（2台目用） */
        #distance-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--analyze-orange); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 200;
        }
        body.analyze #distance-overlay { display: flex; }
        #dist-num { font-size: 5rem; font-weight: bold; }

        /* デバッグ・ステータス */
        #info-panel {
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6);
            padding: 5px 10px; font-size: 0.8rem; z-index: 100; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="setup">
    <h1 style="color: var(--main-blue);">TETRA-SYNC</h1>
    <button class="mode-btn" onclick="init('navigator')">1台目：ナビゲーター</button>
    <button class="mode-btn" onclick="init('dowser')">2台目：ダウジング</button>
</div>

<div id="game-screen">
    <div id="info-panel">Waiting for scan...</div>
    <div id="map"></div>
    <button id="scan-btn" onclick="performScan()">SCAN START</button>
    
    <div id="distance-overlay">
        <p>DISTANCE TO TARGET</p>
        <div id="dist-num">0.0m</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let mode = '';
    let map, userMarker, sectorPolygon;
    const targetPos = [35.681236, 139.767125]; // テスト用の目的地（東京駅）
    let currentHeading = 0;
    let currentDist = 0;

    async function init(selectedMode) {
        mode = selectedMode;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';

        // マップ初期化（最初はズームアウト）
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([35.68, 139.76], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        // 目的地マーカー（透明に近い円で表示）
        L.circle(targetPos, { radius: 10, color: 'red', fillOpacity: 0.5 }).addTo(map);

        // ユーザーマーカー
        userMarker = L.circleMarker([0,0], { radius: 8, color: '#fff', fillColor: '#00f2ff', fillOpacity: 1 }).addTo(map);

        // ナビ機用の扇形（初期は非表示）
        sectorPolygon = L.polygon([], { color: '#00f2ff', weight: 1, fillOpacity: 0.3 }).addTo(map);

        // 3本指タップ（2台目用）
        window.addEventListener('touchstart', (e) => {
            if (mode === 'dowser' && e.touches.length === 3) document.body.classList.add('analyze');
        });
        window.addEventListener('touchend', () => document.body.classList.remove('analyze'));
    }

    // スキャン実行（ボタン押下時のみ動作）
    async function performScan() {
        const info = document.getElementById('info-panel');
        info.innerText = "Scanning...";

        // 1. 方位取得
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            const permission = await DeviceOrientationEvent.requestPermission();
            if (permission === 'granted') {
                window.addEventListener('deviceorientation', captureOrientation, { once: true });
            }
        } else {
            window.addEventListener('deviceorientation', captureOrientation, { once: true });
        }

        // 2. 位置情報取得
        navigator.geolocation.getCurrentPosition((pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            updateMap(lat, lon);
            
            // 距離計算
            currentDist = calculateDistance(lat, lon, targetPos[0], targetPos[1]);
            document.getElementById('dist-num').innerText = `${currentDist.toFixed(1)}m`;
            
            info.innerText = `Last Scan: ${new Date().toLocaleTimeString()}\nDist: ${currentDist.toFixed(1)}m`;

            // 近接バイブ
            if (currentDist < 20 && navigator.vibrate) navigator.vibrate(300);
            
        }, (err) => { alert("GPS Error: " + err.message); }, { enableHighAccuracy: true });
    }

    function captureOrientation(e) {
        currentHeading = e.webkitCompassHeading || (360 - e.alpha);
        // 位置情報が確定した後にdrawSectorが呼ばれる
    }

    function updateMap(lat, lon) {
        const pos = [lat, lon];
        userMarker.setLatLng(pos);
        
        if (mode === 'navigator') {
            map.setView(pos, 18); // ナビ機は高倍率
            drawSector(lat, lon, currentHeading);
        } else {
            map.setView(pos, 16); // ダウジング機は中倍率
        }
    }

    // 扇形を描画するロジック
    function drawSector(lat, lon, heading) {
        if (!heading) return;
        const radius = 0.0005; // 扇の長さ（約50m）
        const points = [ [lat, lon] ];
        const startAngle = (heading - 25) * Math.PI / 180;
        const endAngle = (heading + 25) * Math.PI / 180;

        for (let i = 0; i <= 10; i++) {
            const angle = startAngle + (endAngle - startAngle) * (i / 10);
            const ptLat = lat + radius * Math.cos(angle);
            const ptLon = lon + radius * Math.sin(angle);
            points.push([ptLat, ptLon]);
        }
        sectorPolygon.setLatLngs(points);
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }
</script>
</body>
</html>
