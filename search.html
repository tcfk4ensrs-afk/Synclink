<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetra-Sync Search</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --main-blue: #00f2ff; --analyze-orange: #ff4500; }
        body { margin: 0; font-family: monospace; background: #000; color: white; overflow: hidden; }
        #setup { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; z-index: 1000; position: relative; background: #000; }
        .mode-btn { width: 80%; padding: 20px; font-size: 1.2rem; border: 2px solid var(--main-blue); background: transparent; color: var(--main-blue); border-radius: 10px; }
        #game-screen { display: none; width: 100vw; height: 100vh; position: relative; }
        #map { width: 100%; height: 100%; z-index: 1; display: none; }
        #dowser-ui { width: 100%; height: 100%; display: none; align-items: center; justify-content: center; position: relative; }
        .ripple { width: 50px; height: 50px; border: 2px solid white; border-radius: 50%; position: absolute; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { width: 50px; height: 50px; opacity: 1; } 100% { width: 300px; height: 300px; opacity: 0; } }
        #scan-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px 40px; font-size: 1.2rem; background: rgba(0, 0, 0, 0.9); color: var(--main-blue); border: 2px solid var(--main-blue); border-radius: 30px; z-index: 500; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #distance-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--analyze-orange); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 600; }
        body.analyze #distance-overlay { display: flex; }
        #dist-num { font-size: 5rem; font-weight: bold; }
        #info-panel { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 5px 10px; font-size: 0.8rem; z-index: 100; white-space: pre-wrap; }
    </style>
</head>
<body>

<div id="setup">
    <h1 style="color: var(--main-blue);">TETRA-SYNC</h1>
    <button class="mode-btn" onclick="init('navigator')">1台目：ナビゲーター</button>
    <button class="mode-btn" onclick="init('dowser')">2台目：ダウジング</button>
</div>

<div id="game-screen">
    <div id="info-panel">Waiting for scan...</div>
    <div id="map"></div>
    <div id="dowser-ui">
        <div class="ripple"></div>
        <div class="ripple" style="animation-delay: 1s;"></div>
    </div>
    <button id="scan-btn" onclick="performScan()">SCAN START</button>
    <div id="distance-overlay">
        <p>DISTANCE TO TARGET</p>
        <div id="dist-num">0.0m</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let mode = '';
    let map, userMarker, sectorPolygon, targetMarker;
    let currentDist = 0;

    // LocalStorageからデータを取得するヘルパー
    function getGameData() {
        const cps = JSON.parse(localStorage.getItem('tetra_cps'));
        const step = parseInt(localStorage.getItem('tetra_current_step') || "0");
        return { cps, step };
    }

    async function init(selectedMode) {
        mode = selectedMode;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';

        const { cps, step } = getGameData();
        if (!cps) {
            alert("スタート地点が登録されていません。index.htmlに戻ります。");
            location.href = 'index.html';
            return;
        }

        if (mode === 'navigator') {
            document.getElementById('map').style.display = 'block';
            initMap(cps[step]);
        } else {
            document.getElementById('dowser-ui').style.display = 'flex';
        }

        window.addEventListener('touchstart', (e) => {
            if (mode === 'dowser' && e.touches.length === 3) document.body.classList.add('analyze');
        });
        window.addEventListener('touchend', () => document.body.classList.remove('analyze'));
    }

    function initMap(target) {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([target.lat, target.lon], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        targetMarker = L.circle([target.lat, target.lon], { radius: 15, color: 'red', fillOpacity: 0.8 }).addTo(map);
        userMarker = L.circleMarker([0,0], { radius: 8, color: '#fff', fillColor: '#00f2ff', fillOpacity: 1 }).addTo(map);
        sectorPolygon = L.polygon([], { color: '#00f2ff', weight: 1, fillOpacity: 0.4 }).addTo(map);
    }

    async function performScan() {
        const info = document.getElementById('info-panel');
        info.innerText = "Scanning GPS...";

        const { cps, step } = getGameData();
        const target = cps[step];

        navigator.geolocation.getCurrentPosition((pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            // 距離と方位の計算
            currentDist = calculateDistance(lat, lon, target.lat, target.lon);
            const bearing = calculateBearing(lat, lon, target.lat, target.lon);

            // UI更新
            document.getElementById('dist-num').innerText = `${currentDist.toFixed(1)}m`;
            
            if (mode === 'navigator') {
                updateNavigator(lat, lon, bearing, target);
            }
            
            info.innerText = `Mission: CP${step + 1}\nLast Scan: ${new Date().toLocaleTimeString()}\nDist: ${currentDist.toFixed(1)}m`;

            // 到着判定 (15m以内)
            if (currentDist <= 15) {
                const btn = document.getElementById('scan-btn');
                btn.innerText = "ENTER MISSION";
                btn.style.background = "#ff4500";
                btn.onclick = () => {
                    location.href = `riddle.html?step=${step}`;
                };
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            } else if (currentDist < 50 && navigator.vibrate) {
                navigator.vibrate(300);
            }
            
        }, (err) => { 
            info.innerText = "GPS Error: " + err.message;
        }, { enableHighAccuracy: true });
    }

    function updateNavigator(lat, lon, bearing, target) {
        const pos = [lat, lon];
        userMarker.setLatLng(pos);
        targetMarker.setLatLng([target.lat, target.lon]); // ターゲット位置も更新
        map.setView(pos, 18);
        
        const radius = 0.0006; 
        const points = [ pos ];
        const startAngle = (bearing - 25);
        const endAngle = (bearing + 25);

        for (let i = 0; i <= 10; i++) {
            const angleDeg = startAngle + (endAngle - startAngle) * (i / 10);
            const angleRad = (90 - angleDeg) * Math.PI / 180; 
            const ptLat = lat + radius * Math.sin(angleRad);
            const ptLon = lon + radius * Math.cos(angleRad);
            points.push([ptLat, ptLon]);
        }
        sectorPolygon.setLatLngs(points);
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function calculateBearing(lat1, lon1, lat2, lon2) {
        const y = Math.sin((lon2 - lon1) * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180);
        const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
                  Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos((lon2 - lon1) * Math.PI / 180);
        const brng = Math.atan2(y, x) * 180 / Math.PI;
        return (brng + 360) % 360;
    }
</script>
</body>
</html>
