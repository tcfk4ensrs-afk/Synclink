<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetra-Mission 2</title>
    <style>
        :root { --main-blue: #00f2ff; }
        body { margin: 0; background: #000; color: white; font-family: monospace; overflow: hidden; height: 100vh; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        #mission-container { transition: transform 1s, filter 1s; }
        /* ジャンプ（俯瞰）演出 */
        body.jumping #mission-container { transform: scale(0.1); filter: blur(2px); }
        
        .hint-box { border: 2px solid var(--main-blue); padding: 20px; margin: 20px; position: relative; width: 80%; max-width: 300px; }
        .huge-symbol { font-size: 10rem; color: #111; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1; }
        body.jumping .huge-symbol { color: var(--main-blue); }

        #clear-btn { display: none; margin-top: 30px; padding: 15px 40px; background: transparent; border: 2px solid gold; color: gold; font-weight: bold; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="mission-container">
        <h2>MISSION 02</h2>
        <p>「視点」を高く上げよ。<br>地上に描かれた巨大な印を読み解け。</p>
        <div class="hint-box">
            <p>この枠の中に印がある...</p>
            <div class="huge-symbol">Ω</div> 
        </div>
        <p style="font-size: 0.8rem; color: #555;">(画面を長押ししてジャンプ)</p>
    </div>

    <button id="clear-btn" onclick="finish()">合言葉を確認した</button>

<script>
    let timer;
    // 長押しでジャンプ（俯瞰）
    window.addEventListener('touchstart', () => {
        timer = setTimeout(() => {
            document.body.classList.add('jumping');
            document.getElementById('clear-btn').style.display = 'block';
            if (navigator.vibrate) navigator.vibrate(100);
        }, 1000);
    });

    window.addEventListener('touchend', () => {
        clearTimeout(timer);
        document.body.classList.remove('jumping');
    });

    function finish() {
        // 能力解放のポップアップ通知
        alert("【MISSION 02 COMPLETE】\n\n【SYSTEM UPGRADE】\n能力：ANALYZE が解放されました！\n\n[操作方法]\ndowserモード中、画面を『3本指で同時タップ』している間、ターゲットとの正確な距離を解析できます。");

        // 進捗を2（CP3探索中）に更新
        localStorage.setItem('tetra_current_step', 2);
        
        // Hub画面へ戻る
        location.href = 'hub.html';
    }
</script>
</body>
</html>
