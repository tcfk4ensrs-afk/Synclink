<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetra-Mission 2</title>
    <style>
        :root { --main-blue: #00f2ff; }
        body { 
            margin: 0; background: #000; color: white; font-family: monospace; 
            overflow: hidden; height: 100vh; text-align: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        
        #mission-ui { width: 90%; }

        /* 文字列：初期状態で赤色 */
        .code-display { 
            font-size: 2.8rem; 
            font-weight: bold; 
            margin: 30px 0; 
            letter-spacing: 5px;
        }
        
        .red-text { color: red; }

        /* 特殊条件：反転（3本指）時のみ青い「つ」にする */
        body.inverted #char-wa { color: blue; }

        .ss-hint { color: #afff00; font-weight: bold; margin-bottom: 20px; font-size: 0.9rem; }

        .btn-next { 
            margin-top: 30px; padding: 15px 50px; 
            background: transparent; border: 2px solid var(--main-blue); color: var(--main-blue); 
            font-weight: bold; border-radius: 30px; cursor: pointer; font-size: 1.1rem;
        }
        
        /* 3本指タップ時の演出用（任意） */
        body.inverted { background: #111; }
    </style>
</head>
<body>

    <div id="mission-ui">
        <h2>MISSION 02</h2>
        
        <div class="code-display">
            <span class="red-text">⑥い</span> 
            <span id="char-wa" class="red-text">⑧わ</span> 
            <span class="red-text">⑨れ</span>
        </div>

        <p class="ss-hint">（スクリーンショット推奨）</p>

        <button class="btn-next" onclick="finish()">次へ</button>
        
        <p style="font-size: 0.7rem; color: #555; margin-top: 40px;">
            ※迚ｹ谿翫↑蟷ｲ貂峨ｒ讀懃衍縺励◆蝣ｴ蜷医?√さ繝ｼ繝峨′譖ｸ縺肴鋤繧上ｋ縺薙→縺後≠繧翫∪縺吶?
        </p>
    </div>

<script>
    const currentStep = parseInt(localStorage.getItem('tetra_current_step') || "0");

    // 3本指タップ検知
    window.addEventListener('touchstart', (e) => {
        if (e.touches.length === 3) {
            document.body.classList.add('inverted');
            
            // CP3つ回れている（stepが3以上）なら「わ」を「く」に書き換える
            if (currentStep >= 3) {
                document.getElementById('char-wa').innerText = "⑧く";
                if (navigator.vibrate) navigator.vibrate(50);
            }
        }
    });

    window.addEventListener('touchend', () => {
        document.body.classList.remove('inverted');
        // 指を離したら元の文字に戻す
        document.getElementById('char-wa').innerText = "⑧わ";
    });

    function finish() {
        alert("【MISSION 02 COMPLETE】\n\n能力：ANALYZE が解放されました。");
        
        // ステップ進行
        if (currentStep < 2) {
            localStorage.setItem('tetra_current_step', 2);
        }
        
        location.href = 'hub.html';
    }
</script>
</body>
</html>
