<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FINAL SYNC | NAVIGATOR</title>
    <style>
        :root { --main-blue: #00f2ff; }
        body { margin: 0; background: #000; color: white; font-family: monospace; text-align: center; overflow: hidden; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        #timer { font-size: 3rem; color: #ff4500; margin-bottom: 20px; }
        .code-box { border: 2px solid var(--main-blue); padding: 20px; margin: 10px; }
        .display-label { font-size: 0.8rem; color: #888; }
        .target-code { font-size: 2.5rem; color: gold; font-weight: bold; }
        input { background: #111; border: 2px solid var(--main-blue); color: white; font-size: 2rem; width: 80%; text-align: center; margin-top: 20px; text-transform: uppercase; }
        #progress { margin-top: 10px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="timer">60</div>
    <div id="progress">PHASE: 1 / 5</div>

    <div class="code-box">
        <div class="display-label">相手に伝えろ（DOWSER CODE）</div>
        <div class="target-code" id="send-code">9999</div>
    </div>

    <div class="display-label">相手から聞け（NAV CODE）</div>
    <input type="text" id="input-code" placeholder="ENTER" autocomplete="off">
    <p style="font-size:0.7rem; margin-top:10px;">入力後、画面を上にスワイプ</p>

<script>
    const codes = [
        {nav: "ALPHA", dow: "9999"}, {nav: "ZETA", dow: "1234"},
        {nav: "SOLAR", dow: "8888"}, {nav: "LUNAR", dow: "0000"}, {nav: "SYNC", dow: "7777"}
    ];
    let step = 0;
    let timeLeft = 60;

    // カウントダウン
    const timer = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timer);
            alert("同期失敗：タイムオーバー");
            location.href = "hub.html";
        }
    }, 1000);

    function updateUI() {
        document.getElementById('send-code').innerText = codes[step].dow;
        document.getElementById('progress').innerText = `PHASE: ${step + 1} / 5`;
        document.getElementById('input-code').value = "";
    }

    // スワイプで認証
    let startY = 0;
    window.addEventListener('touchstart', e => startY = e.touches[0].clientY);
    window.addEventListener('touchend', e => {
        if (startY - e.changedTouches[0].clientY > 100) {
            if (document.getElementById('input-code').value.toUpperCase() === codes[step].nav) {
                step++;
                if (step >= 5) {
                    clearInterval(timer);
                    alert("【SYSTEM SYNCHRONIZED】\nCP4 保存完了。");
                    localStorage.setItem('tetra_current_step', 4);
                    location.href = "hub.html";
                } else {
                    updateUI();
                }
            } else {
                alert("認証エラー");
            }
        }
    });
</script>
</body>
</html>
