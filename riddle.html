<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetra-Mission</title>
    <style>
        :root { --main-blue: #00f2ff; }
        body { margin: 0; background: #000; color: white; font-family: monospace; overflow: hidden; height: 100vh; text-align: center; }
        
        #mission-ui { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        
        /* 通常時は黒に近い文字で隠蔽 */
        .hidden-text { color: #010101; font-size: 2rem; font-weight: bold; margin-top: 20px; transition: color 0.1s; filter: blur(1px); }
        
        /* 色反転モード (3本指タップ時) */
        body.inverted { filter: invert(1); background: transparent; }
        body.inverted .hidden-text { color: red; filter: blur(0); } /* 反転で見えるようになる */

        #clear-btn { display: none; margin-top: 30px; padding: 15px; border: 2px solid var(--main-blue); background: transparent; color: var(--main-blue); }
    </style>
</head>
<body>

<div id="mission-ui">
    <h2 id="step-title">MISSION</h2>
    <p id="hint-text">三本の指で闇を暴き、<br>合言葉を解読せよ。</p>
    
    <div id="riddle-content">
        <p>合言葉は...</p>
        <div class="hidden-text" id="secret-msg">ネオンの三角錐</div>
    </div>

    <button id="clear-btn" onclick="clearMission()">合言葉を確認した</button>
</div>

<script>
    const params = new URLSearchParams(location.search);
    const step = parseInt(params.get('step') || "0");
    document.getElementById('step-title').innerText = `MISSION ${step + 1}`;

    // --- 第1問（色変え）ギミック ---
    let clearTimeout = null;

    if (step === 0) { // 第1問の場合
        // 3本指タップ検知
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 3) {
                document.body.classList.add('inverted');
                if (navigator.vibrate) navigator.vibrate(50);
                
                // 3秒間反転し続けたらクリアボタンを出す（ヒントを読んだとみなす）
                clearTimeout = setTimeout(() => {
                    document.getElementById('clear-btn').style.display = 'block';
                    document.getElementById('hint-text').innerText = "合言葉を入力せよ（今回はボタンでクリア）";
                }, 3000);
            }
        });

        window.addEventListener('touchend', () => {
            document.body.classList.remove('inverted');
            if (clearTimeout) clearTimeout(clearTimeout);
        });
    }

    // --- ミッションクリア処理 ---
    function clearMission() {
        // CP1(step 0) をクリアした瞬間の処理
        if (step === 0) {
            // 能力解放の通知
            alert("【MISSION 01 COMPLETE】\n\n【SYSTEM UPGRADE】\n能力：JUMP が解放されました！\n\n[操作方法]\nsearch画面で『上スワイプ』をすると、30秒間だけ高度を上げ、広域マップを確認できます。");
            
            // 進捗を1に更新
            localStorage.setItem('tetra_current_step', 1);
        } else {
            // もしこのファイルを他のステップで使い回す場合の汎用処理
            alert("ミッションクリア！");
            localStorage.setItem('tetra_current_step', step + 1);
        }
        
        // クリア後はHubに戻って全体図を確認させる
        location.href = 'hub.html';
    }
</script>
</body>
</html>
