<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetra-Mission 1 | Zoom Out Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --main-blue: #00f2ff; --grid-bg-green: #8fd376; }
        body { 
            margin: 0; background: #000; color: white; font-family: "Meiryo", sans-serif;
            overflow: hidden; height: 100vh; text-align: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        #mission-ui { width: 95%; max-width: 500px; z-index: 10; }
        
        .hint-text { font-size: 0.9rem; margin-bottom: 25px; letter-spacing: 1px; background: rgba(0,0,0,0.7); padding: 5px; }

        /* グリッド外枠のコンテナ：ここでズームアニメーションを制御 */
        .viewport {
            overflow: hidden;
            border: 2px solid #555;
            background: #fff;
            margin: 0 auto;
            width: 300px; /* 固定サイズ */
            height: 300px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            width: 100%;
            height: 100%;
            /* 初期状態：中央5x5が見えるように約1.4倍ズームし、中央に寄せる */
            transform: scale(1.4);
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* ズームアウト実行時の状態（本来の7x7を表示） */
        body.revealed .grid-container {
            transform: scale(1);
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 1.1rem;
            border: 0.5px solid #333;
            box-sizing: border-box;
            background-color: #fff;
            transition: background-color 0.8s, opacity 0.8s;
        }

        /* 中央の緑マス */
        .cell.green { background-color: var(--grid-bg-green); }

        /* 外周の白マス：最初は少し暗くしておく（任意） */
        .cell.white { opacity: 0.3; }
        body.revealed .cell.white { opacity: 1; }

        .btn-next { 
            margin-top: 30px; padding: 12px 40px; 
            background: rgba(0,0,0,0.8); border: 2px solid var(--main-blue); color: var(--main-blue); 
            font-weight: bold; border-radius: 30px; cursor: pointer;
        }
        
        .ss-hint { color: #afff00; font-size: 0.8rem; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="mission-ui">
        <h2>MISSION 01</h2>
        <div class="hint-text">
            ③：5個しかない文字　⑤：1つしかない文字　⑦：3つしかない文字
        </div>

        <div class="viewport">
            <div class="grid-container" id="puzzle-grid">
                <!-- JSで生成 -->
            </div>
        </div>

        <button class="btn-next" onclick="finish()">次へ</button>
        <p class="ss-hint">（スクリーンショット推奨）</p>
    </div>

<script>
    const gridData = [
        ["け", "す", "け", "さ", "け", "さ", "さ"],
        ["す", "み", "よ", "よ", "か", "あ", "さ"],
        ["け", "ふ", "か", "い", "さ", "い", "さ"],
        ["す", "あ", "ぬ", "か", "さ", "か", "さ"],
        ["け", "い", "み", "か", "ふ", "ぬ", "さ"],
        ["け", "み", "け", "い", "み", "さ", "つ"],
        ["け", "さ", "さ", "つ", "さ", "つ", "さ"]
    ];

    const gridContainer = document.getElementById('puzzle-grid');
    const currentStep = parseInt(localStorage.getItem('tetra_current_step') || "0");

    for (let r = 0; r < 7; r++) {
        for (let c = 0; c < 7; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = gridData[r][c];
            if (r >= 1 && r <= 5 && c >= 1 && c <= 5) {
                cell.classList.add('green');
            } else {
                cell.classList.add('white');
            }
            gridContainer.appendChild(cell);
        }
    }

    let startY = 0;
    window.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; });
    window.addEventListener('touchend', (e) => {
        const endY = e.changedTouches[0].clientY;
        // 上スワイプ操作
        if (currentStep >= 3 && startY - endY > 80) {
            document.body.classList.add('revealed');
            if (navigator.vibrate) navigator.vibrate([50, 30, 100]);
        }
    });

    function finish() {
        alert("【MISSION 01 COMPLETE】\n能力：JUMP 解放。");
        if (currentStep < 1) localStorage.setItem('tetra_current_step', 1);
        location.href = 'hub.html';
    }
</script>
</body>
</html>
