<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetra-Sync | Hub</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --main-blue: #00f2ff; }
        body { margin: 0; background: #fff; color: #333; font-family: monospace; overflow: hidden; height: 100vh; }
        
        /* マップとUIパネルの比率を調整 */
        #map { width: 100%; height: 60vh; }
        #ui-panel { 
            height: 40vh; display: flex; flex-direction: column; align-items: center; 
            justify-content: flex-start; background: #000; color: white; 
            border-top: 3px solid var(--main-blue); padding-top: 15px; box-sizing: border-box;
        }

        /* 指示文 */
        .guide-msg { color: var(--main-blue); font-size: 0.8rem; margin-bottom: 10px; font-weight: bold; letter-spacing: 0.05em; }

        /* 回答欄グリッドの再現 */
        .answer-grid { display: flex; border: 1px solid #555; background: #fff; margin-bottom: 15px; box-shadow: 0 0 10px rgba(0,242,255,0.2); }
        .ans-cell {
            width: 35px; height: 35px; display: flex; align-items: center; justify-content: center;
            color: #000; font-weight: bold; border: 0.5px solid #000; font-size: 0.9rem;
        }
        /* 各マスの色定義 */
        .c-purple { background-color: #df69c5; }
        .c-green  { background-color: #8fd376; }
        .c-red    { background-color: #ff0000; }
        .c-blue   { background-color: #00b0f0; }
        .c-white  { background-color: #ffffff; }

        .info-text { font-size: 1rem; color: var(--main-blue); margin-bottom: 15px; font-weight: bold; }
        .btn-search { padding: 12px 40px; background: var(--main-blue); color: #000; border: none; font-weight: bold; border-radius: 30px; text-decoration: none; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .btn-search:active { opacity: 0.7; transform: scale(0.95); }
    </style>
</head>
<body>

<div id="map"></div>

<div id="ui-panel">
    <!-- 追加: 指示文 -->
    <div class="guide-msg">各CPをめぐり文字を埋めて指示に従え</div>
    
    <!-- 追加: 回答欄UI -->
    <div class="answer-grid">
        <div class="ans-cell c-purple">①</div>
        <div class="ans-cell c-purple">②</div>
        <div class="ans-cell c-green">③</div>
        <div class="ans-cell c-purple">④</div>
        <div class="ans-cell c-white">⑤</div>
        <div class="ans-cell c-red">⑥</div>
        <div class="ans-cell c-blue">⑦</div>
        <div class="ans-cell c-white">⑧</div>
        <div class="ans-cell c-red">⑨</div>
    </div>

    <div class="info-text" id="progress-info">SYSTEM READY</div>
    <button class="btn-search" id="action-btn" onclick="handleMainAction()">探索を開始する</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const cps = JSON.parse(localStorage.getItem('tetra_cps'));
    const origin = JSON.parse(localStorage.getItem('tetra_origin'));
    const currentStep = parseInt(localStorage.getItem('tetra_current_step') || "0");

    const map = L.map('map', { zoomControl: true }).setView([origin.lat, origin.lon], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 原点マーカー
    const originMarker = L.circleMarker([origin.lat, origin.lon], {
        radius: 10, color: 'blue', fillColor: '#00f2ff', fillOpacity: 0.9
    }).addTo(map);
    
    let originPopup = `<div style="text-align:center; color:#000;"><b>START / ORIGIN</b><br>`;
    if (currentStep >= 3) {
        originPopup += `<p style="font-size:0.8rem;">全地点の同期完了</p>`;
        originPopup += `<button onclick="warpToRitual()" style="width:100%; padding:5px; cursor:pointer; background:gold; border:none; font-weight:bold;">最終同期へワープ</button>`;
    } else {
        originPopup += `<p style="font-size:0.8rem;">ここが全ての始まりの場所です</p>`;
    }
    originPopup += `</div>`;
    originMarker.bindPopup(originPopup);

    // 到達済みのCPを表示 & 座標を配列に格納
    let polyCoords = [];
    for (let i = 0; i < currentStep; i++) {
        const cp = cps[i];
        polyCoords.push([cp.lat, cp.lon]); // 座標を蓄積

        const marker = L.circle([cp.lat, cp.lon], { radius: 40, color: "green", fillOpacity: 0.5 }).addTo(map);
        const photo = localStorage.getItem(`tetra_photo_${i+1}`);
        
        let popupContent = `<div style="text-align:center; color:#000;"><b>CHECKPOINT ${i+1}</b><br><img src="${photo}" style="width:120px; margin:5px 0;"><br>`;
        if (currentStep >= 3) {
            popupContent += `<button onclick="warpToCP(${i})" style="width:100%; padding:5px; cursor:pointer; background:var(--main-blue); border:none; font-weight:bold;">WARP</button>`;
        } else {
            popupContent += `<div style="font-size:0.7rem; color:red; font-weight:bold;">WARP LOCK: CP3制覇で解放</div>`;
        }
        popupContent += `</div>`;
        marker.bindPopup(popupContent);
    }

    // 追加: 3地点を巡っている場合、三角形を薄く表示してイベントを追加
    if (currentStep >= 3) {
        const syncTriangle = L.polygon(polyCoords, {
            color: 'gold',
            weight: 2,
            fillColor: 'gold',
            fillOpacity: 0.2,
            dashArray: '5, 5'
        }).addTo(map);

        // 三角形タップ時のポップアップ
        syncTriangle.on('click', () => {
            alert("まだ問題を完全に解けてないみたい");
        });
    }

    // UIパネル更新
    const infoPanel = document.getElementById('progress-info');
    const actionBtn = document.getElementById('action-btn');

    if (currentStep >= 3) {
        infoPanel.innerText = `到達状況: ${currentStep} / 3 (ALL CLEAR)`;
        actionBtn.innerText = "最終同期を開始";
    } else {
        infoPanel.innerText = `到達状況: ${currentStep} / 3 地点`;
    }

    function handleMainAction() {
        if (currentStep >= 3) {
            warpToRitual();
        } else {
            location.href = 'search.html';
        }
    }

    function warpToRitual() {
        if (confirm("全ての地点が同期されました。原点へ戻り、最終同期を開始しますか？")) {
            location.href = 'search.html';
        }
    }

    function warpToCP(stepIndex) {
        if(confirm(`CP${stepIndex+1} へワープしますか？`)) {
            let targetPage = "riddle.html";
            if (stepIndex === 1) targetPage = "riddle2.html";
            if (stepIndex === 2) targetPage = "riddle3.html";
            location.href = `${targetPage}?step=${stepIndex}`;
        }
    }
</script>
</body>
</html>
