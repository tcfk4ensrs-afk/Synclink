<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetra-Sync Setup</title>
    <style>
        :root { --main-blue: #00f2ff; }
        body { background: #000; color: var(--main-blue); text-align: center; font-family: monospace; padding: 20px; }
        .btn { padding: 20px; font-size: 1.2rem; border: 2px solid var(--main-blue); background: transparent; color: var(--main-blue); cursor: pointer; border-radius: 10px; width: 80%; margin-top: 20px; }
        .btn:disabled { border-color: #555; color: #555; }
        #preview { width: 100%; max-width: 400px; height: auto; border: 2px solid var(--main-blue); display: none; margin-top: 20px; }
        #canvas { display: none; }
    </style>
</head>
<body>
    <h1>MISSION START</h1>
    <p>原点を登録し、<br>最初の記録を撮影せよ。</p>
    
    <video id="preview" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <button id="loc-btn" class="btn" onclick="registerOrigin()">1. 現在地を登録</button>
    <button id="photo-btn" class="btn" onclick="takeFirstPhoto()" disabled>2. 記録を撮影</button>

    <script>
        let originPos = null;

        // 手順1: 位置情報登録
        function registerOrigin() {
            navigator.geolocation.getCurrentPosition((pos) => {
                originPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                localStorage.setItem('tetra_origin', JSON.stringify(originPos));
                
                document.getElementById('loc-btn').innerText = "登録完了";
                document.getElementById('loc-btn').disabled = true;
                document.getElementById('photo-btn').disabled = false;
                
                // カメラ起動
                startCamera();
            });
        }

        async function startCamera() {
            const video = document.getElementById('preview');
            video.style.display = 'block';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                video.srcObject = stream;
            } catch (err) { alert("カメラの起動に失敗しました。"); }
        }

        // 手順2: 写真撮影・保存
        function takeFirstPhoto() {
            const video = document.getElementById('preview');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            // 画像をBase64形式で保存
            const imgData = canvas.toDataURL('image/jpeg');
            localStorage.setItem('tetra_photo_0', imgData);
            
            // CP座標生成（正三角形）
            const r = 0.009; // 半径1km (簡易)
            const cps = [
                { lat: originPos.lat + r, lon: originPos.lon },
                { lat: originPos.lat - r/2, lon: originPos.lon + r * Math.sqrt(3)/2 },
                { lat: originPos.lat - r/2, lon: originPos.lon - r * Math.sqrt(3)/2 }
            ];
            localStorage.setItem('tetra_cps', JSON.stringify(cps));
            localStorage.setItem('tetra_current_step', "0");

            alert("記録完了。探索を開始してください。");
            location.href = 'hub.html';
        }
    </script>
</body>
</html>
